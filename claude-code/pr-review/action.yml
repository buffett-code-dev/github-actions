name: 'Claude PR Review'
description: 'Claude Code ActionによるPRレビューとIssue対応'
author: 'buffett-code-dev'

inputs:
  anthropic_api_key:
    description: 'Anthropic API Key'
    required: true
  allowed_bots:
    description: '許可するボットのリスト（カンマ区切り）'
    required: false
    default: ''
  checkout_fetch_depth:
    description: 'チェックアウト時のfetch-depth'
    required: false
    default: '1'

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.checkout_fetch_depth }}

    - name: Run Claude PR Action
      # よりセキュアに運用するため、v1 と記載せずにパッチバージョンまで明記している
      # v1.0.89以降、SENSITIVE_PATHSにsymlinkが含まれるとcpSyncがENOENTでクラッシュするバグあり
      # see: https://github.com/anthropics/claude-code-action/issues/1187
      # 修正PR(#1186)がマージされたらバージョンを上げること
      uses: anthropics/claude-code-action@v1.0.107
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        allowed_bots: ${{ inputs.allowed_bots }}
