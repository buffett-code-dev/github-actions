# このディレクトリ配下の package-lock.json に含まれる以下の脆弱性は、
# OSV-Scanner の検出を意図的に抑制する。
#
# 理由:
# - serverless 自体が廃止予定 (README.md 参照)
# - これまで `npm install serverless@3.38.0 ...` を実行時に行っており、
#   同じ依存ツリーが本番運用で動いていた組み合わせ。lockfile 化で初めて
#   CI スキャンに見えるようになっただけで、新たに混入したものではない
# - すべての脆弱性は serverless@3 系の transitive dependency 由来で、
#   v3 系は構造上 aws-sdk v2 / tar v6 / 古い uuid 等に依存しているため、
#   v3 系内のバージョン差し替えでは解消できない
# - serverless 廃止のタイミングで本ファイルごと削除する

