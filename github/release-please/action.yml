name: 'Release Please'
description: 'Create release pull requests and GitHub releases using release-please'
author: 'buffett-code-dev'

inputs:
  github-token:
    description: 'GitHub token with contents write and pull-requests write permissions'
    required: true
  config-file:
    description: 'Path to the release-please config file'
    required: false
    default: 'release-please-config.json'
  manifest-file:
    description: 'Path to the release-please manifest file'
    required: false
    default: '.release-please-manifest.json'
  release-type:
    description: 'Release type (e.g. node, python, etc.). Used only when config-file/manifest-file are not provided'
    required: false
  target-branch:
    description: 'Target branch for release-please to operate on'
    required: false

outputs:
  release_created:
    description: 'Whether a release was created (single package)'
    value: ${{ steps.release-please.outputs.release_created }}
  releases_created:
    description: 'Whether any releases were created (mono-repo)'
    value: ${{ steps.release-please.outputs.releases_created }}
  tag_name:
    description: 'The tag name of the created release'
    value: ${{ steps.release-please.outputs.tag_name }}
  upload_url:
    description: 'The upload URL for the created release'
    value: ${{ steps.release-please.outputs.upload_url }}
  prs_created:
    description: 'Whether any pull requests were created or updated'
    value: ${{ steps.release-please.outputs.prs_created }}
  pr:
    description: 'The pull request number of the release PR'
    value: ${{ steps.release-please.outputs.pr }}
  major:
    description: 'The major version of the created release'
    value: ${{ steps.release-please.outputs.major }}
  minor:
    description: 'The minor version of the created release'
    value: ${{ steps.release-please.outputs.minor }}
  patch:
    description: 'The patch version of the created release'
    value: ${{ steps.release-please.outputs.patch }}
  paths_released:
    description: 'Paths that had releases created (JSON string)'
    value: ${{ steps.release-please.outputs.paths_released }}
  all:
    description: 'All outputs from release-please as JSON string (for package-specific outputs in mono-repo)'
    value: ${{ steps.export-outputs.outputs.all }}

runs:
  using: 'composite'
  steps:
    - name: Run release-please
      id: release-please
      uses: googleapis/release-please-action@v4
      with:
        token: ${{ inputs.github-token }}
        config-file: ${{ inputs.config-file }}
        manifest-file: ${{ inputs.manifest-file }}
        release-type: ${{ inputs.release-type }}
        target-branch: ${{ inputs.target-branch }}

    - name: Export all outputs
      id: export-outputs
      shell: bash
      env:
        OUTPUTS_JSON: ${{ toJSON(steps.release-please.outputs) }}
      run: |
        {
          echo "all<<RELEASE_PLEASE_OUTPUTS_EOF"
          echo "$OUTPUTS_JSON"
          echo "RELEASE_PLEASE_OUTPUTS_EOF"
        } >> "$GITHUB_OUTPUT"
